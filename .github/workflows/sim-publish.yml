name: Publish simulator images

on:
  push:
    branches: [main]
    tags:    ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform: [wechat, alipay]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: make build

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags (SHA-only + version on tag events)
        id: tags
        run: |
          image="ghcr.io/skyapm/mini-program-monitor/sim-${{ matrix.platform }}"
          sha="${{ github.sha }}"
          tags="${image}:${sha}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/}"
            tags="${tags},${image}:${version}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "Resolved tags: ${tags}"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sim
          build-args: |
            PLATFORM=${{ matrix.platform }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/SkyAPM/mini-program-monitor
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0
          provenance: false
