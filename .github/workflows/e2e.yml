name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install docker-compose v2 standalone binary
        run: |
          sudo curl -sSL \
            https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-linux-x86_64 \
            -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install skywalking-infra-e2e
        run: |
          go install github.com/apache/skywalking-infra-e2e/cmd/e2e@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - run: make build

      - name: Run e2e
        working-directory: e2e
        run: e2e run -c e2e.yaml

      - name: Dump compose logs on failure
        if: failure()
        working-directory: e2e
        run: |
          docker compose ps || true
          docker compose logs oap || true
          docker compose logs otel-collector || true
          docker compose logs mock-collector || true

      - name: Upload e2e configs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-debug
          path: |
            e2e/e2e.yaml
            e2e/docker-compose.yml
            e2e/harness/
            e2e/verify/
          if-no-files-found: ignore
