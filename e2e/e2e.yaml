# skywalking-infra-e2e test case.
#
# Orchestration:
#   setup   — docker compose up OAP+BanyanDB+UI+OTel Collector, build SDK,
#             run Node harness to emit OTLP metrics + logs, verify output.
#   verify  — passthrough (verification done in setup steps via check-otlp.mjs).
#   cleanup — docker compose down, always.

setup:
  env: compose
  file: docker-compose.yml
  timeout: 15m
  init-system-environment: .env
  steps:
    - name: build SDK
      command: bash -c "cd .. && npm run build"
    - name: emit test events
      command: node harness/run.mjs
      env:
        COLLECTOR_URL: http://127.0.0.1:4318
    - name: wait for collector flush
      command: sleep 5
    - name: verify OTLP data
      command: node verify/check-otlp.mjs
      env:
        COMPOSE_DIR: .

verify:
  retry:
    count: 1
    interval: 1s
  cases:
    - query: echo "OTLP verification done in setup steps"
      expected: expected/ok.yaml

cleanup:
  on: always
