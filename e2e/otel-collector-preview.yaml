receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: detailed
  otlphttp/oap:
    endpoint: http://oap:12800
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [debug, otlphttp/oap]
    logs:
      receivers: [otlp]
      exporters: [debug, otlphttp/oap]
